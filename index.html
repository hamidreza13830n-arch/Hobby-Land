<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیام‌رسان تلگرامی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #0088cc;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .online-status {
            font-size: 12px;
            opacity: 0.9;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 70%;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }
        .message-sent {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .message-received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .message-text {
            font-size: 14px;
        }
        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            text-align: left;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
            gap: 10px;
        }
        .message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-family: inherit;
        }
        .send-btn {
            background: #0088cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .login-screen {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .google-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        .hidden {
            display: none;
        }
        .status-icon {
            font-size: 12px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <h2>📱 پیام‌رسان</h2>
        <p>مثل تلگرام، اما ساده‌تر!</p>
        <button class="google-btn" id="loginBtn">🚀 ورود با گوگل</button>
    </div>

    <div id="chatContainer" class="chat-container hidden">
        <div class="chat-header">
            <span>💬 پیام‌رسان</span>
            <div>
                <span id="onlineCount">🟢 0 آنلاین</span>
                <button class="logout-btn" id="logoutBtn">خروج</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <input type="text" id="messageInput" class="message-input" placeholder="پیام خود را بنویسید...">
            <button class="send-btn" id="sendBtn">📤 ارسال</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        // کانفیگ Firebase (مال شما)
        const firebaseConfig = {
            apiKey: "AIzaSyARAsQaZhfHHPFVBOpKmPx7u90UVrJoUuM",
            authDomain: "hobby-land-b0e00.firebaseapp.com",
            databaseURL: "https://hobby-land-b0e00-default-rtdb.firebaseio.com",
            projectId: "hobby-land-b0e00",
            storageBucket: "hobby-land-b0e00.firebasestorage.app",
            messagingSenderId: "1001642178322",
            appId: "1:1001642178322:web:a2ca537d1520b9b43d65cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // عناصر DOM
        const loginScreen = document.getElementById('loginScreen');
        const chatContainer = document.getElementById('chatContainer');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const onlineCountSpan = document.getElementById('onlineCount');

        // تابع ارسال پیام
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            const messagesRef = ref(db, 'messages');
            await push(messagesRef, {
                text: text,
                uid: currentUser.uid,
                name: currentUser.displayName,
                photoURL: currentUser.photoURL,
                timestamp: serverTimestamp(),
                status: 'sent' // sent, delivered, seen
            });
            messageInput.value = '';
        }

        // تابع نمایش پیام‌ها
        function displayMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${data.uid === currentUser?.uid ? 'message-sent' : 'message-received'}`;
            
            // اسم فرستنده (فقط برای پیام‌های دریافتی)
            let senderName = '';
            if (data.uid !== currentUser?.uid) {
                senderName = `<div style="font-size: 10px; color: #0088cc; margin-bottom: 3px;">${data.name || 'ناشناس'}</div>`;
            }
            
            const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString('fa-IR') : 'در حال ارسال...';
            
            messageDiv.innerHTML = `
                ${senderName}
                <div class="message-text">${escapeHtml(data.text)}</div>
                <div class="message-time">
                    ${time}
                    ${data.uid === currentUser?.uid ? '<span class="status-icon">✓✓</span>' : ''}
                </div>
            `;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // تابع برای جلوگیری از XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // وضعیت آنلاین کاربران
        function setUserStatus(userId, status) {
            const userStatusRef = ref(db, `status/${userId}`);
            set(userStatusRef, {
                status: status,
                lastSeen: serverTimestamp()
            });
        }

        function countOnlineUsers() {
            const statusRef = ref(db, 'status');
            onValue(statusRef, (snapshot) => {
                let online = 0;
                snapshot.forEach((child) => {
                    const data = child.val();
                    if (data.status === 'online') online++;
                });
                onlineCountSpan.innerHTML = `🟢 ${online} آنلاین`;
            });
        }

        // شنود پیام‌های جدید
        function listenForMessages() {
            const messagesRef = ref(db, 'messages');
            onChildAdded(messagesRef, (snapshot) => {
                const message = snapshot.val();
                if (message && currentUser) {
                    displayMessage(message);
                }
            });
        }

        // مدیریت ورود و خروج
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginScreen.classList.add('hidden');
                chatContainer.classList.remove('hidden');
                
                // ثبت وضعیت آنلاین
                setUserStatus(user.uid, 'online');
                onValue(ref(db, `status/${user.uid}`), (snapshot) => {
                    if (!snapshot.exists()) {
                        setUserStatus(user.uid, 'online');
                    }
                });
                
                // وقتی صفحه بسته شد، آفلاین شود
                window.addEventListener('beforeunload', () => {
                    setUserStatus(user.uid, 'offline');
                });
                
                countOnlineUsers();
                listenForMessages();
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden');
                chatContainer.classList.add('hidden');
                messagesArea.innerHTML = '';
            }
        });

        // رویدادها
        loginBtn.onclick = () => signInWithPopup(auth, provider);
        logoutBtn.onclick = () => {
            if (currentUser) {
                setUserStatus(currentUser.uid, 'offline');
                signOut(auth);
            }
        };
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
    </script>
</body>
</html>
